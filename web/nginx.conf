server {
    # Frontend container listens on non-privileged HTTP port.
    listen 8080;
    server_name _;

    # Built Vue files copied here by the Docker image build.
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # SPA fallback: serve index.html when route file does not exist.
        try_files $uri $uri/ /index.html;
    }
}
