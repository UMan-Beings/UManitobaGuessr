server {
    # frontend container listens on http port.
    listen 8081;
    # 
    server_name umanitobaguessr.local;

    # where the built frontend files are inside the container
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        # Forward API requests to the backend service
        proxy_pass http://backend-umg:8081;

        proxy_http_version 1.1;

        # Clear the Connection header so nginx manages the backend connection
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        # Serve index.html for unknown paths so the frontend router can handle them
        try_files $uri $uri/ /index.html;
    }
}
