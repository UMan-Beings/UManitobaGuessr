server {
    # frontend container listens on http port.
    listen 8081;
    # 
    server_name umanitobaguessr.local;

    # where the built frontend files are inside the container
    root /usr/share/nginx/html;
    index index.html;

    # proxy /api requests to the backend services
    location /api/ {
        proxy_pass http://backend_umg:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: route unknown paths (e.g., /game/test) to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
