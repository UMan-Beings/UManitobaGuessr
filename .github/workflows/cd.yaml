name: cd pipeline

# cd workflow triggered only on release creation
on:
  release:
    types: [published]

jobs:
  release-backend-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      # step 1: checkout repo at release tag
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.VERSION }}  # checkout the code at the release tag that triggered this workflow
          fetch-depth: 1           # only fetch this commit

      # step 2: login to ghcr
      - name: Login to github container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: uman-beings
          password: ${{ secrets.GITHUB_TOKEN }}

      # step 3: login to docker hub
      - name: Login to docker hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # step 4: build and push backend image to GHCR and Docker Hub.
      - name: Build and push backend image to GHCR and docker hub
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/uman-beings/uman-backend:${{ env.VERSION }}
            ghcr.io/uman-beings/uman-backend:latest
            ${{ secrets.DOCKERHUB_USER }}/uman-backend:${{ env.VERSION }}
            ${{ secrets.DOCKERHUB_USER }}/uman-backend:latest

  release-frontend-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      # step 1: checkout repo at release tag
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.VERSION }}
          fetch-depth: 1

      # step 2: login to ghcr
      - name: Login to github container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # step 3: login to docker hub
      - name: Login to docker hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # step 4: build and push frontend image to GHCR and Docker Hub.
      - name: Build and push frontend image to GHCR and docker hub
        uses: docker/build-push-action@v7
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: |
            ghcr.io/uman-beings/uman-frontend:${{ env.VERSION }}
            ghcr.io/uman-beings/uman-frontend:latest
            ${{ secrets.DOCKERHUB_USER }}/uman-frontend:${{ env.VERSION }}
            ${{ secrets.DOCKERHUB_USER }}/uman-frontend:latest
