# H2 in-memory database configuration for tests
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:test_user}
spring.datasource.password=${DB_PASS:mypassword}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=always