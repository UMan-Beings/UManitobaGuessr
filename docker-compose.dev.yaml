# ---------------------------------------
# Commands for running in dev environment
# ---------------------------------------

# Build and run full dev app (db + backend + frontend)
# docker-compose -f docker-compose.dev.yaml -p umg_dev up --build

# Stop dev environment
# docker-compose -f docker-compose.dev.yaml -p umg_dev down

# Remove dev containers, network, and volumes
# docker-compose -f docker-compose.dev.yaml -p umg_dev down -v

# App URL (frontend + proxied API): http://localhost:3000/game/test

services:
  db_umg:
    image: postgres:18
    container_name: db_umg_dev
    env_file:
      - ./env/.env.dev
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "myuser", "-d", "dev_database", "-q"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql

  # spring boot backend
  backend_umg:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_umg_dev
    env_file:
      - ./env/.env.dev
    # keep backend internal, frontend nginx proxies /api requests to this service.
    expose:
      - "8081"
    depends_on:
      db_umg:
        condition: service_healthy

  # vue frontend
  frontend_umg:
    # Run Vite dev server automatically in-container for one-command startup.
    image: node:22-alpine
    container_name: frontend_umg_dev
    working_dir: /app
    environment:
      - VITE_API_PROXY_TARGET=http://backend_umg:8081
    command: sh -c "corepack enable && pnpm install && pnpm dev --host 0.0.0.0 --port 3000"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend_umg:
        condition: service_started

volumes:
  postgres_dev_data:
  web_node_modules:
