# ------------------------------------
# Commands to run in prod environment
# -----------------------------------

# Build and run full prod app (db + backend + frontend)
# docker-compose -f docker-compose.prod.yaml -p umg_prod up --build

# Stop prod environment
# docker-compose -f docker-compose.prod.yaml -p umg_prod down

# Remove prod containers, network, and volumes
# docker-compose -f docker-compose.prod.yaml -p umg_prod down -v

# App URL (frontend + proxied API): http://localhost:7000/game/test

services:
  db_umg:
    image: postgres:18
    container_name: db_umg_prod
    env_file:
      - ./env/.env.prod
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "myuser", "-d", "prod_database", "-q"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_prod_data:/var/lib/postgresql
    networks:
      - app_internal

  # spring boot backend
  backend_umg:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_umg_prod
    env_file:
      - ./env/.env.prod
    # keep backend internal, frontend nginx proxies /api requests to this service.
    expose:
      - "8081"
    depends_on:
      db_umg:
        condition: service_healthy
    networks:
      - app_internal

  # vue frontend
  frontend_umg:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: frontend_umg_prod
    ports:
      - "${FRONTEND_PORT:-7000}:8081"
    depends_on:
      backend_umg:
        condition: service_started
    networks:
      - frontend_net
      - app_internal

volumes:
  postgres_prod_data:

networks:
  frontend_net:
  app_internal:
    internal: true